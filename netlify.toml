[build]
  base = "mini-app/"
  command = "npm run build"
  publish = "dist"

# Backend API ga proxy (agar kerak bo'lsa)
[[redirects]]
  from = "/api/*"
  to = "https://adammardanov-tashkent-cafe-bot.hf.space/api/:splat"
  status = 200
  force = true

# React Router uchib ketmasligi uchun (SPA fallback)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
