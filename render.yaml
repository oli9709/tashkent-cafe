services:
  - type: web
    name: tashkent-cafe-bot
    env: node
    rootDir: bot
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: MINI_APP_URL
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: BANK_ACCOUNT
        sync: false
      - key: BANK_OWNER
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
